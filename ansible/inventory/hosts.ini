# Ansible Inventory
# Replace the IPs with your actual EC2 public IPs
# For local testing, use 127.0.0.1 with ansible_connection=local

[webservers]
# ec2-user@<your-ec2-ip>
app-server-1 ansible_host=<EC2_PUBLIC_IP> ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/devops-demo-key.pem

[webservers:vars]
ansible_python_interpreter=/usr/bin/python3

# For local testing without EC2, uncomment below and comment out the EC2 line above:
# app-server-1 ansible_host=127.0.0.1 ansible_connection=local
