version: "3.9"

services:
  app:
    build:
      context: ../app
      dockerfile: ../docker/Dockerfile
    container_name: devops-demo-app
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
      - APP_VERSION=1.0.0
    # Mount source code so changes reflect without rebuilding
    volumes:
      - ../app:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

